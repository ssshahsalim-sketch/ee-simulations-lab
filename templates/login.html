<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — EE Simulations</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060810;color:#c8d8f0;font-family:'Rajdhani',sans-serif;
  min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;}
.box{background:#101422;border:1px solid #1c2236;border-radius:12px;
  padding:48px 40px;width:380px;position:relative;z-index:1;
  box-shadow:0 0 60px rgba(0,212,255,.07);}
.logo{font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;
  color:#00d4ff;text-align:center;margin-bottom:6px;text-shadow:0 0 20px rgba(0,212,255,.5);}
.logo span{color:#ff6b00;}
.sub{text-align:center;color:#4a5878;font-size:.88rem;margin-bottom:36px;}
label{display:block;font-size:.8rem;color:#4a5878;letter-spacing:1px;margin-bottom:6px;}
input[type=password]{width:100%;padding:12px 14px;
  background:#0c0f1a;border:1px solid #1c2236;border-radius:6px;
  color:#c8d8f0;font-family:'Rajdhani',sans-serif;font-size:1rem;outline:none;transition:.2s;}
input[type=password]:focus{border-color:#00d4ff;}
.error{color:#ff4466;font-size:.85rem;margin-top:8px;
  padding:8px 12px;background:rgba(255,68,102,.08);
  border:1px solid rgba(255,68,102,.2);border-radius:4px;}
button{width:100%;margin-top:20px;padding:12px;
  background:#00d4ff;border:none;border-radius:6px;
  color:#060810;font-family:'Rajdhani',sans-serif;
  font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:1px;transition:.2s;}
button:hover{background:#00b8d9;}
.note{text-align:center;color:#4a5878;font-size:.8rem;margin-top:14px;line-height:1.6;}
.back{text-align:center;margin-top:16px;}
.back a{color:#4a5878;font-size:.85rem;text-decoration:none;transition:.2s;}
.back a:hover{color:#00d4ff;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">⚡ EE<span>SIM</span></div>
  <div class="sub">Admin Login</div>
  <form method="POST">
    <label>PASSWORD</label>
    <input type="password" name="password" placeholder="Enter admin password" autofocus>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <button type="submit">→ Enter Admin Mode</button>
  </form>
  <div class="note">After login you'll be taken back to the website<br>where you can edit everything visually.</div>
  <div class="back"><a href="/">← Back to site</a></div>
</div>
</body>
</html>
