<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API Frontend vs Backend Simulator</title>
<style>
body{font-family:Arial;margin:20px;background:#f5f5f5}
.box{border:2px solid #444;border-radius:8px;padding:12px;margin:10px;background:white}
.row{display:flex;gap:10px;flex-wrap:wrap}
.col{flex:1;min-width:220px}
button{padding:8px 14px}
#log{height:280px;overflow:auto;background:#111;color:#0f0;padding:10px;font-family:monospace}
input,select{width:100%;padding:6px}
</style>
</head>
<body>
<h2>Interactive API Simulator (Frontend → Backend → AI Model)</h2>
<p>Enter a message and click <b>Send</b>. Watch each backend step.</p>
<div class="row">
<div class="box col">
<h3>Frontend (HTML)</h3>
<label>User Message</label>
<input id="msg" value="Explain induction motor">
<label>API Key</label>
<input id="key" value="AIzaSy-Example-Key">
<label>Model</label>
<select id="model">
<option>gemini-2.5-flash</option>
<option>gemini-2.5-pro</option>
</select><br><br>
<button onclick="run()">Send Request</button>
</div>
<div class="box col">
<h3>Backend Status</h3>
<div id="status">Idle</div>
</div>
</div>
<div class="box">
<h3>Backend Log</h3>
<div id="log"></div>
</div>
<script>
const log=(t)=>{let d=document.getElementById('log');d.innerHTML+=t+"<br>";d.scrollTop=d.scrollHeight;}
async function step(txt,ms){document.getElementById("status").innerHTML=txt;log("▶ "+txt);await new Promise(r=>setTimeout(r,ms));}
async function run(){
document.getElementById("log").innerHTML="";
const msg=document.getElementById("msg").value;
const key=document.getElementById("key").value;
const model=document.getElementById("model").value;
await step("1. Frontend collects user message",700);
log("Message: "+msg);
await step("2. Frontend creates API request",700);
log("Request = {apiKey, model, prompt}");
await step("3. Request sent over Internet",700);
await step("4. Google Server validates API key",900);
if(key.length<10){log("❌ Invalid API Key");document.getElementById("status").innerHTML="Request Rejected";return;}
log("✅ API Key Accepted");
await step("5. Backend selects model: "+model,900);
await step("6. AI model processes prompt",1200);
let ans=(model.includes("flash")?"Fast":"Advanced")+" response: Induction motor works using electromagnetic induction.";
log("🤖 "+ans);
await step("7. Response returned to frontend",700);
document.getElementById("status").innerHTML="<b>Completed</b><br><br><b>AI Response:</b><br>"+ans;
}
</script>
</body>
</html>
