<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL // Global Radio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080f;--bg2:#0f0f1a;--bg3:#161625;--surface:#1a1a2e;--surface2:#222236;--border:#2a2a44;--accent:#7c6fff;--accent2:#ff6b9d;--accent3:#00d4aa;--text:#e8e8f5;--text2:#8888aa;--text3:#44445a;--live:#ff3355;--radius:12px;--player-h:84px}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;min-height:100vh;overflow-x:hidden}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:56px;background:rgba(8,8,15,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.logo span{color:var(--accent)}
.hdr-right{display:flex;align-items:center;gap:10px}
.on-air{display:none;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 8px;font-size:12px}
.on-air.show{display:flex}
.on-air-dot{width:7px;height:7px;border-radius:50%;background:var(--live);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,51,85,.5)}50%{box-shadow:0 0 0 5px rgba(255,51,85,0)}}
.on-air-label{color:var(--text2);font-size:11px}
.on-air-name{color:var(--text);font-weight:600;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-btn{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit;display:flex;align-items:center;gap:6px;transition:all .2s}
.fav-btn:hover,.fav-btn.active{border-color:var(--accent2);color:var(--accent2)}
.fav-count{background:var(--accent2);color:#fff;border-radius:10px;padding:1px 6px;font-size:11px;font-weight:700}

/* MAIN */
main{padding-top:56px;padding-bottom:calc(var(--player-h) + 8px)}

/* GLOBE SECTION */
.globe-section{position:relative;width:100%;height:420px;overflow:hidden;background:radial-gradient(ellipse 80% 100% at 50% 50%,rgba(124,111,255,.07) 0%,transparent 70%)}
#globeCanvas{width:100%;height:100%;display:block;cursor:grab}
#globeCanvas:active{cursor:grabbing}
.globe-label{position:absolute;top:18px;left:20px;pointer-events:none}
.globe-eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
.globe-title{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.globe-title em{font-style:normal;color:var(--accent)}
.globe-sub{font-size:12px;color:var(--text2);margin-top:4px}
.globe-tooltip{position:absolute;background:rgba(10,10,20,.92);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;pointer-events:none;display:none;z-index:50;max-width:200px}
.globe-tooltip .tt-name{font-weight:700;color:var(--text);margin-bottom:2px}
.globe-tooltip .tt-country{color:var(--text2);font-size:11px}
.globe-tooltip .tt-tags{color:var(--accent);font-size:10px;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.globe-tooltip .tt-play{font-size:10px;color:var(--accent3);margin-top:4px}

/* STATS */
.stats-bar{display:flex;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--bg2)}
.stat-item{flex:1;padding:12px 16px;border-right:1px solid var(--border);text-align:center}
.stat-item:last-child{border-right:none}
.stat-num{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--text);display:block}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}

/* FILTERS */
.filter-sec{padding:16px 20px 0}
.search-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:180px;position:relative}
.s-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none}
input.search-inp{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px 9px 32px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}
input.search-inp:focus{border-color:var(--accent)}
input.search-inp::placeholder{color:var(--text3)}
select.csel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 11px;color:var(--text);font-family:inherit;font-size:13px;outline:none;cursor:pointer;transition:border-color .2s}
select.csel:focus{border-color:var(--accent)}
select.csel option{background:var(--bg2)}
.chips-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.chip{padding:4px 11px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:inherit;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}

/* GRID */
.grid-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
.grid-title-txt{font-size:16px;font-weight:600}
.grid-cnt-badge{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:11px;color:var(--text2);font-family:'Space Mono',monospace}
.station-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;padding:0 20px 20px}

/* CARDS */
.station-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .18s;overflow:hidden;display:flex;flex-direction:column;gap:5px}
.station-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .2s}
.station-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(124,111,255,.12)}
.station-card:hover::before{opacity:1}
.station-card.playing{border-color:var(--accent2);background:rgba(255,107,157,.05)}
.station-card.playing::before{opacity:1;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.card-top{display:flex;align-items:center;gap:9px}
.card-flag{font-size:20px;line-height:1;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.card-country{font-size:10px;color:var(--text3);margin-top:1px}
.card-tags{display:flex;gap:3px;flex-wrap:wrap}
.tag-pill{font-size:9px;background:var(--bg3);color:var(--text3);border-radius:4px;padding:2px 5px;text-transform:uppercase;letter-spacing:.4px}
.card-bot{display:flex;align-items:center;justify-content:space-between;margin-top:3px}
.play-btn{width:30px;height:30px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;transition:all .15s;flex-shrink:0}
.play-btn:hover{background:var(--accent2);transform:scale(1.1)}
.station-card.playing .play-btn{background:var(--accent2)}
.fav-heart{background:none;border:none;cursor:pointer;color:var(--text3);font-size:15px;transition:all .15s;padding:3px;line-height:1}
.fav-heart:hover,.fav-heart.faved{color:var(--accent2)}
.mini-wave{display:none;align-items:center;gap:2px;height:14px}
.station-card.playing .mini-wave{display:flex}
.mini-wave span{display:block;width:2px;border-radius:2px;background:var(--accent2);animation:mw var(--d2,.9s) ease-in-out infinite alternate;animation-delay:var(--del2,0s)}
@keyframes mw{from{height:3px}to{height:12px}}

/* PLAYER */
.player-bar{position:fixed;bottom:0;left:0;right:0;z-index:300;height:var(--player-h);background:rgba(8,8,15,.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px}
.player-bar.idle .pcenter,.player-bar.idle .pright{opacity:.35;pointer-events:none}
.pleft{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.p-flag{font-size:26px}
.p-info{min-width:0}
.p-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
.p-meta{font-size:10px;color:var(--text2);margin-top:1px}
.pcenter{display:flex;align-items:center;gap:7px}
.ctrl-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.main-play-btn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(124,111,255,.4);transition:all .15s}
.main-play-btn:hover{transform:scale(1.08)}
.pright{display:flex;align-items:center;gap:8px}
.vol-icon{color:var(--text2);font-size:14px}
input[type=range]{-webkit-appearance:none;width:90px;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--accent);cursor:pointer}
.p-wave{display:flex;align-items:center;gap:2px;height:24px}
.p-wave.paused span{animation-play-state:paused}
.p-wave span{display:block;width:2px;border-radius:2px;background:var(--accent);animation:pw var(--pd,1s) ease-in-out infinite alternate;animation-delay:var(--pdel,0s)}
@keyframes pw{from{height:3px;opacity:.5}to{height:var(--ph,18px);opacity:1}}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--player-h)+12px);right:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:9px 14px;font-size:12px;color:var(--text);z-index:400;animation:tin .25s ease forwards;max-width:260px}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.empty-state{text-align:center;padding:50px 20px;color:var(--text2)}
.empty-state p:first-child{font-size:28px;margin-bottom:6px}

@media(max-width:600px){.pright{display:none}.p-name{max-width:150px}.on-air-name{max-width:100px}.globe-section{height:320px}}
</style>
</head>

<header>
  <div class="logo">SIGNAL <span>//</span></div>
  <div class="hdr-right">
    <span class="on-air" id="onAir">
      <span class="on-air-dot"></span>
      <span class="on-air-label">ON AIR</span>
      <span class="on-air-name" id="onAirName">—</span>
    </span>
    <button class="fav-btn" id="favToggle">♥ Favourites <span class="fav-count" id="favCount">0</span></button>
  </div>
</header>

<main>
  <!-- GLOBE -->
  <div class="globe-section">
    <canvas id="globeCanvas"></canvas>
    <div class="globe-label">
      <div class="globe-eyebrow">Live · Worldwide · Free</div>
      <div class="globe-title">The World<br>Plays <em>Now</em></div>
      <div class="globe-sub">Click any dot to tune in live</div>
    </div>
    <div class="globe-tooltip" id="tooltip">
      <div class="tt-name" id="tt-name"></div>
      <div class="tt-country" id="tt-country"></div>
      <div class="tt-tags" id="tt-tags"></div>
      <div class="tt-play">▶ Click to play</div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-num" id="stTotal">—</span><span class="stat-label">Stations</span></div>
    <div class="stat-item"><span class="stat-num" id="stCountries">—</span><span class="stat-label">Countries</span></div>
    <div class="stat-item"><span class="stat-num" id="stShowing">—</span><span class="stat-label">Showing</span></div>
    <div class="stat-item"><span class="stat-num" id="stFavs">0</span><span class="stat-label">Favourites</span></div>
  </div>

  <!-- FILTERS -->
  <div class="filter-sec">
    <div class="search-row">
      <div class="search-wrap">
        <span class="s-icon">⌕</span>
        <input class="search-inp" id="searchInp" type="text" placeholder="Search stations, tags, countries…">
      </div>
      <select class="csel" id="countrySel"><option value="">All countries</option></select>
    </div>
    <div class="chips-row" id="contChips"></div>
    <div class="chips-row" id="tagChips"></div>
  </div>

  <!-- GRID -->
  <div class="grid-hdr">
    <span class="grid-title-txt">Stations</span>
    <span class="grid-cnt-badge" id="gridCnt">— stations</span>
  </div>
  <div id="stGrid" class="station-grid"></div>
</main>

<!-- PLAYER -->
<div class="player-bar idle" id="playerBar">
  <div class="pleft">
    <div class="p-flag" id="pFlag">📻</div>
    <div class="p-info">
      <div class="p-name" id="pName">Select a station to begin</div>
      <div class="p-meta" id="pMeta">SIGNAL // Global Radio</div>
    </div>
  </div>
  <div class="pcenter">
    <button class="ctrl-btn" id="prevBtn">⏮</button>
    <button class="main-play-btn" id="mainPlayBtn">▶</button>
    <button class="ctrl-btn" id="nextBtn">⏭</button>
    <div class="p-wave paused" id="pWave"></div>
  </div>
  <div class="pright">
    <span class="vol-icon">🔊</span>
    <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8">
  </div>
</div>

<audio id="audioEl" preload="none"></audio>

// ─── STATE ──────────────────────────────────────────────────────────────────
let ST={search:'',country:'',continent:'',tag:'',favorites:JSON.parse(localStorage.getItem('sigFavs')||'[]'),favOnly:false,current:null,playing:false};
const audio=document.getElementById('audioEl');

// ─── FILTER ─────────────────────────────────────────────────────────────────
function filtered(){
  let l=STATIONS;
  if(ST.favOnly) l=l.filter(s=>ST.favorites.includes(s.id));
  if(ST.continent) l=l.filter(s=>s.continent===ST.continent);
  if(ST.country) l=l.filter(s=>s.country===ST.country);
  if(ST.tag) l=l.filter(s=>s.tags.includes(ST.tag));
  if(ST.search){const q=ST.search.toLowerCase();l=l.filter(s=>s.name.toLowerCase().includes(q)||s.country.toLowerCase().includes(q)||s.tags.some(t=>t.includes(q)));}
  return l;
}

// ─── RENDER GRID ────────────────────────────────────────────────────────────
function render(){
  const list=filtered();
  document.getElementById('gridCnt').textContent=list.length+' stations';
  document.getElementById('stShowing').textContent=list.length;
  const grid=document.getElementById('stGrid');
  if(!list.length){grid.innerHTML='<div class="empty-state"><p>📡</p><p>No stations match</p></div>';return;}
  grid.innerHTML=list.map(s=>{
    const isP=ST.current&&ST.current.id===s.id;
    const isFav=ST.favorites.includes(s.id);
    const tags=s.tags.slice(0,3).map(t=>`<span class="tag-pill">${t}</span>`).join('');
    const wav=[.5,.9,.7,1.1,.6,.8].map((h,i)=>`<span style="--d2:${(.6+i*.15).toFixed(2)}s;--del2:${(i*.1).toFixed(1)}s"></span>`).join('');
    return`<div class="station-card${isP?' playing':''}" onclick="playStation('${s.id}')">
      <div class="card-top"><span class="card-flag">${s.flag}</span><div class="card-info"><div class="card-name">${s.name}</div><div class="card-country">${s.country}</div></div></div>
      <div class="card-tags">${tags}</div>
      <div class="card-bot">
        <div class="mini-wave">${wav}</div>
        <button class="play-btn" onclick="event.stopPropagation();playStation('${s.id}')">${isP&&ST.playing?'⏸':'▶'}</button>
        <button class="fav-heart${isFav?' faved':''}" onclick="event.stopPropagation();toggleFav('${s.id}')">♥</button>
      </div></div>`;
  }).join('');
  updateGlobeDots();
}

// ─── PLAY ───────────────────────────────────────────────────────────────────
function playStation(id){
  const s=STATIONS.find(x=>x.id===id);if(!s)return;
  if(ST.current&&ST.current.id===id){
    if(ST.playing){audio.pause();ST.playing=false;}else{audio.play().catch(()=>{});ST.playing=true;}
    updatePlayer();render();return;
  }
  ST.current=s;ST.playing=true;
  audio.src=s.url;audio.volume=document.getElementById('volSlider').value;
  audio.load();audio.play().catch(()=>showToast('⚠️ Stream unavailable'));
  updatePlayer();updateOnAir(s);render();
}

function updatePlayer(){
  const s=ST.current;
  document.getElementById('playerBar').classList.toggle('idle',!s);
  if(s){
    document.getElementById('pFlag').textContent=s.flag;
    document.getElementById('pName').textContent=s.name;
    document.getElementById('pMeta').textContent=s.country+' · '+s.tags.slice(0,2).join(', ');
    document.getElementById('mainPlayBtn').textContent=ST.playing?'⏸':'▶';
    document.getElementById('pWave').classList.toggle('paused',!ST.playing);
  }
}
function updateOnAir(s){const el=document.getElementById('onAir');el.classList.toggle('show',!!s);if(s)document.getElementById('onAirName').textContent=s.name;}
function playByIdx(o){const l=filtered();if(!l.length)return;let i=ST.current?l.findIndex(x=>x.id===ST.current.id):-1;i=((i+o)+l.length)%l.length;playStation(l[i].id);}

document.getElementById('prevBtn').onclick=()=>playByIdx(-1);
document.getElementById('nextBtn').onclick=()=>playByIdx(1);
document.getElementById('mainPlayBtn').onclick=()=>{if(!ST.current)return;if(ST.playing){audio.pause();ST.playing=false;}else{audio.play().catch(()=>{});ST.playing=true;}updatePlayer();render();};
document.getElementById('volSlider').oninput=e=>audio.volume=e.target.value;

audio.onerror=()=>{ST.playing=false;updatePlayer();showToast('⚠️ Stream unavailable — try another');};
audio.onplaying=()=>{ST.playing=true;updatePlayer();render();};
audio.onpause=()=>{ST.playing=false;updatePlayer();};

// ─── 3D GLOBE WITH REAL WORLD MAP ───────────────────────────────────────────
(function(){
  const canvas=document.getElementById('globeCanvas');
  const tooltip=document.getElementById('tooltip');
  const R=180;

  let W,H,cx,cy;
  function resize(){
    W=canvas.offsetWidth;H=canvas.offsetHeight;
    canvas.width=W*devicePixelRatio;canvas.height=H*devicePixelRatio;
    cx=W/2;cy=H/2;
  }
  resize();
  window.addEventListener('resize',()=>{resize();});

  const ctx=canvas.getContext('2d');
  let rotY=0.3,rotX=-0.2;
  let isDragging=false,lastX=0,lastY=0;
  let autoSpin=true;
  let hoveredStation=null;
  let geoFeatures=null; // loaded GeoJSON features

  function latLngTo3D(lat,lng){
    const phi=(90-lat)*Math.PI/180;
    const theta=(lng+180)*Math.PI/180;
    return{x:Math.sin(phi)*Math.cos(theta),y:Math.cos(phi),z:Math.sin(phi)*Math.sin(theta)};
  }

  function rotate(p){
    const x1=p.x*Math.cos(rotY)-p.z*Math.sin(rotY);
    const z1=p.x*Math.sin(rotY)+p.z*Math.cos(rotY);
    const y2=p.y*Math.cos(rotX)-z1*Math.sin(rotX);
    const z2=p.y*Math.sin(rotX)+z1*Math.cos(rotX);
    return{x:x1,y:y2,z:z2};
  }

  function project(p){
    const fov=2.5;
    const z=p.z+fov;
    const px=(p.x/z)*R+cx;
    const py=(-p.y/z)*R+cy;
    return{x:px*devicePixelRatio,y:py*devicePixelRatio,visible:p.z>-0.05,z:p.z};
  }

  // ── Draw country polygons from GeoJSON ──────────────────────────────────
  function drawCountries(){
    if(!geoFeatures)return;
    const sc=devicePixelRatio;

    geoFeatures.forEach(feature=>{
      const geom=feature.geometry;
      if(!geom)return;
      const polys=geom.type==='Polygon'?[geom.coordinates]:geom.type==='MultiPolygon'?geom.coordinates:[];

      polys.forEach(poly=>{
        poly.forEach(ring=>{
          ctx.beginPath();
          let started=false,prevVisible=false;
          for(let i=0;i<ring.length;i++){
            const [lng,lat]=ring[i];
            const p3=latLngTo3D(lat,lng);
            const r=rotate(p3);
            const {x,y,visible}=project(r);
            if(visible){
              if(!started||!prevVisible){ctx.moveTo(x,y);started=true;}
              else ctx.lineTo(x,y);
            }
            prevVisible=visible;
          }
          // land fill
          ctx.fillStyle='rgba(30,50,80,0.75)';
          ctx.fill();
          // border
          ctx.strokeStyle='rgba(100,160,220,0.35)';
          ctx.lineWidth=0.6*sc;
          ctx.stroke();
        });
      });
    });
  }

  // ── Grid lines ──────────────────────────────────────────────────────────
  function drawGrid(){
    ctx.strokeStyle='rgba(80,120,200,0.08)';
    ctx.lineWidth=0.5*devicePixelRatio;
    for(let lat=-60;lat<=60;lat+=30){
      ctx.beginPath();let f=true;
      for(let lng=-180;lng<=180;lng+=2){
        const r=rotate(latLngTo3D(lat,lng));
        const {x,y,visible}=project(r);
        if(visible){if(f){ctx.moveTo(x,y);f=false;}else ctx.lineTo(x,y);}else f=true;
      }ctx.stroke();
    }
    for(let lng=-180;lng<=180;lng+=30){
      ctx.beginPath();let f=true;
      for(let lat=-90;lat<=90;lat+=2){
        const r=rotate(latLngTo3D(lat,lng));
        const {x,y,visible}=project(r);
        if(visible){if(f){ctx.moveTo(x,y);f=false;}else ctx.lineTo(x,y);}else f=true;
      }ctx.stroke();
    }
  }

  const CCOLOR={'as':'#ff7b54','eu':'#5b9bd5','na':'#ffc107','sa':'#e05c2a','af':'#7bc67e','oc':'#b39ddb','':'#7c6fff'};
  let dotPositions=[];

  function drawDots(list){
    dotPositions=[];
    const sc=devicePixelRatio;
    const entries=STATIONS.map(s=>{
      const p3=latLngTo3D(s.lat,s.lng);
      const r=rotate(p3);
      const proj=project(r);
      return{s,r,proj};
    }).sort((a,b)=>a.r.z-b.r.z);

    entries.forEach(({s,r,proj})=>{
      if(!proj.visible)return;
      const isActive=ST.current&&ST.current.id===s.id;
      const isHov=hoveredStation&&hoveredStation.id===s.id;
      const inFilter=list.some(x=>x.id===s.id);
      const color=CCOLOR[s.continent]||'#7c6fff';
      const br=(isActive?7:isHov?6:inFilter?4:2.5)*sc;

      if(isActive){
        // pulsing ring
        const pulse=(Math.sin(Date.now()*0.004)*0.5+0.5);
        const rg=ctx.createRadialGradient(proj.x,proj.y,br,proj.x,proj.y,br*(3+pulse*2));
        rg.addColorStop(0,'rgba(255,107,157,0.4)');
        rg.addColorStop(1,'rgba(255,107,157,0)');
        ctx.beginPath();ctx.arc(proj.x,proj.y,br*(3+pulse*2),0,Math.PI*2);
        ctx.fillStyle=rg;ctx.fill();
      } else if(isHov){
        const rg=ctx.createRadialGradient(proj.x,proj.y,br,proj.x,proj.y,br*3.5);
        rg.addColorStop(0,'rgba(124,111,255,0.35)');
        rg.addColorStop(1,'rgba(124,111,255,0)');
        ctx.beginPath();ctx.arc(proj.x,proj.y,br*3.5,0,Math.PI*2);
        ctx.fillStyle=rg;ctx.fill();
      }

      ctx.beginPath();ctx.arc(proj.x,proj.y,br,0,Math.PI*2);
      if(isActive){
        ctx.fillStyle='#ff6b9d';
        ctx.shadowColor='#ff6b9d';ctx.shadowBlur=12*sc;
      } else if(isHov){
        ctx.fillStyle='#fff';
        ctx.shadowColor='#7c6fff';ctx.shadowBlur=8*sc;
      } else {
        ctx.fillStyle=inFilter?color:'rgba(60,60,90,0.6)';
        ctx.shadowBlur=0;
      }
      ctx.fill();
      ctx.shadowBlur=0;

      if(isActive||isHov){
        ctx.strokeStyle='rgba(255,255,255,0.9)';
        ctx.lineWidth=1.2*sc;ctx.stroke();
      }
      dotPositions.push({s,x:proj.x/sc,y:proj.y/sc,r:(isActive?7:isHov?6:4)+5});
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const sc=devicePixelRatio;

    // Ocean
    const oceanGrad=ctx.createRadialGradient(
      (cx-R*0.25)*sc,(cy-R*0.2)*sc,R*0.1*sc,
      cx*sc,cy*sc,R*1.05*sc
    );
    oceanGrad.addColorStop(0,'#0d2040');
    oceanGrad.addColorStop(0.5,'#071428');
    oceanGrad.addColorStop(1,'#030a18');
    ctx.beginPath();ctx.arc(cx*sc,cy*sc,R*sc,0,Math.PI*2);
    ctx.fillStyle=oceanGrad;ctx.fill();

    // Atmosphere glow
    const atmo=ctx.createRadialGradient(cx*sc,cy*sc,R*sc*0.92,cx*sc,cy*sc,R*sc*1.12);
    atmo.addColorStop(0,'rgba(30,80,160,0.3)');
    atmo.addColorStop(0.5,'rgba(20,60,140,0.1)');
    atmo.addColorStop(1,'rgba(10,30,80,0)');
    ctx.beginPath();ctx.arc(cx*sc,cy*sc,R*sc*1.12,0,Math.PI*2);
    ctx.fillStyle=atmo;ctx.fill();

    // clip to globe for map + grid
    ctx.save();
    ctx.beginPath();ctx.arc(cx*sc,cy*sc,R*sc,0,Math.PI*2);ctx.clip();
    drawGrid();
    drawCountries();
    ctx.restore();

    // highlight ring (specular)
    const spec=ctx.createRadialGradient(
      (cx-R*0.3)*sc,(cy-R*0.35)*sc,0,
      (cx-R*0.05)*sc,(cy-R*0.1)*sc,R*0.7*sc
    );
    spec.addColorStop(0,'rgba(255,255,255,0.07)');
    spec.addColorStop(1,'rgba(255,255,255,0)');
    ctx.save();
    ctx.beginPath();ctx.arc(cx*sc,cy*sc,R*sc,0,Math.PI*2);ctx.clip();
    ctx.fillStyle=spec;ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.restore();

    // dots on top (no extra clip so glow can spill slightly)
    ctx.save();
    ctx.beginPath();ctx.arc(cx*sc,cy*sc,R*sc*1.04,0,Math.PI*2);ctx.clip();
    drawDots(filtered());
    ctx.restore();
  }

  let lastT=0;
  function loop(t){
    if(autoSpin&&!isDragging) rotY+=0.0025;
    lastT=t;
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // Drag
  canvas.addEventListener('mousedown',e=>{isDragging=true;autoSpin=false;lastX=e.clientX;lastY=e.clientY;});
  window.addEventListener('mousemove',e=>{
    if(isDragging){
      rotY+=(e.clientX-lastX)*0.005;
      rotX+=(e.clientY-lastY)*0.005;
      rotX=Math.max(-1.3,Math.min(1.3,rotX));
      lastX=e.clientX;lastY=e.clientY;
    }
    const rect=canvas.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    let hit=null;
    for(const d of dotPositions){if(Math.hypot(d.x-mx,d.y-my)<d.r){hit=d.s;break;}}
    if(hit!==hoveredStation) hoveredStation=hit;
    if(hit){
      document.getElementById('tt-name').textContent=hit.flag+' '+hit.name;
      document.getElementById('tt-country').textContent=hit.country;
      document.getElementById('tt-tags').textContent=hit.tags.slice(0,3).join(' · ');
      let tx=mx+16,ty=my-64;
      if(tx+210>W)tx=mx-222;
      if(ty<0)ty=my+12;
      tooltip.style.left=tx+'px';tooltip.style.top=ty+'px';tooltip.style.display='block';
      canvas.style.cursor='pointer';
    } else {
      tooltip.style.display='none';
      canvas.style.cursor=isDragging?'grabbing':'grab';
    }
  });
  window.addEventListener('mouseup',()=>{isDragging=false;setTimeout(()=>{autoSpin=true;},2500);});
  canvas.addEventListener('click',()=>{if(hoveredStation)playStation(hoveredStation.id);});

  // Touch
  canvas.addEventListener('touchstart',e=>{isDragging=true;autoSpin=false;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;},{passive:true});
  canvas.addEventListener('touchmove',e=>{
    rotY+=(e.touches[0].clientX-lastX)*0.005;
    rotX+=(e.touches[0].clientY-lastY)*0.005;
    rotX=Math.max(-1.3,Math.min(1.3,rotX));
    lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
  },{passive:true});
  canvas.addEventListener('touchend',()=>{isDragging=false;setTimeout(()=>{autoSpin=true;},3000);});

  window.updateGlobeDots=()=>{};
})();

// ─── INIT ────────────────────────────────────────────────────────────────────
buildPWave();
buildContinents();
buildTags();
buildCountrySel();
updateStats();
updateFavUI();
render();
</script>
